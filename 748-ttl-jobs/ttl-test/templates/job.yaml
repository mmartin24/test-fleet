apiVersion: batch/v1
kind: Job
metadata:
  name: ttl-test-job
  operations:
  - {"op":"ignore"}
spec:
  # THIS IS THE TTL FIELD
  ttlSecondsAfterFinished: 10
  template:
    spec:
      containers:
      - name: worker
        image: busybox
        command: ["sh", "-c", "echo 'Work finished!'; sleep 5"]
      restartPolicy: Never
