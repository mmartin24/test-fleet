apiVersion: batch/v1
kind: Job
metadata:
  name: ttl-test-1-job
  namespace: default
spec:
  ttlSecondsAfterFinished: 10  # <--- It must be here for K8s to see it
  template:
    spec:
      containers:
      - name: worker
        image: busybox
        command: ["sh", "-c", "echo 'Work finished!'; sleep 5"]
      restartPolicy: Never
